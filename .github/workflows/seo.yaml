name: SEO Workflow

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Rin repository
        uses: actions/checkout@v4
        with:
          path: Rin

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 21

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1

      # 1. 先只安装系统级依赖（Ubuntu 需要这些库来跑 Chrome）
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev

      # 2. 合并所有操作到同一个 step，确保目录(cd Rin/)上下文一致
      - name: Install & Run
        env: 
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ vars.S3_REGION }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SEO_BASE_URL: ${{ vars.SEO_BASE_URL }}
          SEO_CONTAINS_KEY: ${{ vars.SEO_CONTAINS_KEY }}
          S3_ACCESS_HOST: ${{ vars.S3_ACCESS_HOST }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_CACHE_FOLDER: ${{ vars.S3_CACHE_FOLDER }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
        run: |
          cd Rin/
          
          echo "📦 Installing dependencies..."
          bun install --frozen-lockfile
          
          echo "🌐 Installing Chrome for Puppeteer..."
          # 关键修改：在 bun install 之后，显式调用 puppeteer 下载浏览器
          bun x puppeteer browsers install chrome
          
          echo "🚀 Running SEO script..."
          bun scripts/seo-render.ts
