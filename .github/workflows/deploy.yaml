name: Deploy

on:
  push:
    branches:
      - main  # 只要推送到 main 分支就自动部署
  workflow_dispatch: # 保留手动触发按钮

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 删除了原来的仓库名称限制，确保在你的 fork 仓库也能运行

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Rin repository
        uses: actions/checkout@v4
        with:
          path: Rin
          # 默认拉取最新提交，不需要指定 ref

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.6

      # 这里删除了原本的 "Validate deployment version" 步骤

      - name: Deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID  }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN  }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RIN_GITHUB_CLIENT_ID: ${{ secrets.RIN_GITHUB_CLIENT_ID }}
          RIN_GITHUB_CLIENT_SECRET: ${{ secrets.RIN_GITHUB_CLIENT_SECRET }}

          # 环境变量
          DB_NAME: ${{ vars.DB_NAME }}
          WORKER_NAME: ${{ vars.WORKER_NAME }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          S3_ACCESS_HOST: ${{ vars.S3_ACCESS_HOST }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_CACHE_FOLDER: ${{ vars.S3_CACHE_FOLDER }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_FOLDER: ${{ vars.S3_FOLDER }}
          S3_REGION: ${{ vars.S3_REGION }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE }}
          WEBHOOK_URL: ${{ vars.WEBHOOK_URL }}
          RSS_TITLE: ${{ vars.RSS_TITLE }}
          RSS_DESCRIPTION: ${{ vars.RSS_DESCRIPTION }}
        run: |
          cd Rin/
          bun install --frozen-lockfile
          bun scripts/deploy-cf.ts

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Successfully deployed branch main"
          echo ""
          echo "Deployment completed at $(date)"
